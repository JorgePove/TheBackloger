<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El.Trackerino</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── INDEX-ONLY STYLES ─────────────────────────────────────────────── */
    html, body {
      min-height: 100vh;
      display: block;
      overflow-x: hidden;
    }

    /* ambient blobs */
    .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .ambient-blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.08;
      animation: blobDrift 18s ease-in-out infinite alternate;
    }
    .ambient-blob:nth-child(1) { width: 700px; height: 700px; background: var(--cyan);     top: -200px; left: -100px; animation-delay: 0s; }
    .ambient-blob:nth-child(2) { width: 500px; height: 500px; background: var(--magenta);  bottom: -150px; right: -100px; animation-delay: -6s; }
    .ambient-blob:nth-child(3) { width: 400px; height: 400px; background: var(--blue);     top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -12s; }
    @keyframes blobDrift {
      0%   { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.15) translate(30px,-20px); }
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 4rem 2rem 5rem;
    }

    /* ── HEADER ── */
    .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 3.5rem; }

    .title-frame {
      position: relative;
      padding: 1.4rem 3.2rem;
      border: 1px solid rgba(0,229,204,0.3);
      border-radius: 12px;
      background: rgba(0,229,204,0.03);
      animation: framePulse 3s ease-in-out infinite;
    }
    .title-frame::before, .title-frame::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: var(--cyan); border-style: solid;
    }
    .title-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .title-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    @keyframes framePulse {
      0%, 100% {
        box-shadow: 0 0 20px rgba(0,229,204,0.08), 0 0 60px rgba(0,229,204,0.04);
        border-color: rgba(0,229,204,0.25);
      }
      50% {
        box-shadow: 0 0 35px rgba(0,229,204,0.22), 0 0 100px rgba(0,229,204,0.10);
        border-color: rgba(0,229,204,0.55);
      }
    }

    .title-inner {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .title-inner span { color: var(--cyan); text-shadow: var(--glow-cyan); }

    .title-sub {
      margin-top: 0.9rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--text3);
      text-align: center;
    }

    /* ── YEAR TABS ── */
    .year-section { width: 100%; max-width: 780px; margin-bottom: 2.8rem; }
    .year-tabs-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text3); margin-bottom: 0.8rem; text-align: center;
    }
    .year-tabs-row { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }

    .year-tab {
      position: relative;
      padding: 0.5rem 1.4rem;
      border-radius: 5px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 8px;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .year-tab:hover { border-color: rgba(0,229,204,0.3); color: var(--text); background: var(--bg3); }
    .year-tab.active {
      background: rgba(0,229,204,0.09);
      border-color: rgba(0,229,204,0.5);
      color: var(--cyan);
      box-shadow: var(--glow-cyan);
    }

    .year-tab-delete {
      display: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(255,68,102,0.15); border: 1px solid rgba(255,68,102,0.3);
      color: var(--red); font-size: 0.6rem;
      align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s; flex-shrink: 0; line-height: 1;
    }
    .year-tab:hover .year-tab-delete { display: flex; }
    .year-tab-delete:hover { background: rgba(255,68,102,0.3); }

    .year-add-btn {
      width: 34px; height: 34px; border-radius: 5px;
      border: 1px dashed var(--border2); background: transparent;
      color: var(--text3); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .year-add-btn:hover { border-color: rgba(0,229,204,0.4); color: var(--cyan); background: rgba(0,229,204,0.05); box-shadow: var(--glow-cyan); }

    /* ── YEAR PICKER DROPDOWN ── */
    .year-add-wrap { position: relative; flex-shrink: 0; }
    .year-picker-dropdown {
      display: none;
      position: fixed; /* fixed so it escapes any overflow/clip-path context */
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,229,204,0.15), var(--glow-cyan);
      z-index: 9999;
      min-width: 140px;
      /* position set dynamically via JS */
    }
    .year-picker-dropdown.open { display: flex; flex-direction: column; }
    .year-picker-header {
      padding: 0.5rem 0.9rem 0.4rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .year-picker-list {
      max-height: 220px;
      overflow-y: scroll; /* scroll (not auto) forces scrollbar always visible */
      overscroll-behavior: contain;
    }
    .year-picker-list::-webkit-scrollbar { width: 4px; }
    .year-picker-list::-webkit-scrollbar-track { background: var(--bg4); }
    .year-picker-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    .year-picker-option {
      display: block; width: 100%;
      padding: 0.45rem 0.9rem;
      background: none; border: none;
      color: var(--text2);
      font-family: 'Orbitron', sans-serif; font-size: 0.78rem; font-weight: 600;
      text-align: left; cursor: pointer;
      transition: background 0.12s, color 0.12s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .year-picker-option:hover { background: rgba(0,229,204,0.08); color: var(--cyan); }
    .year-picker-option.already-added { color: var(--text3); cursor: default; pointer-events: none; }
    .year-picker-option.already-added::after { content: ' ✓'; font-size: 0.6rem; opacity: 0.5; }

    /* ── SECTION GRID ── */
    .sections-grid {
      width: 100%; max-width: 780px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    }

    .section-btn {
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 2rem 1.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer; text-decoration: none;
      color: var(--text2);
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
      overflow: hidden;
    }
    .section-btn::before {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.3s; border-radius: inherit;
    }
    .section-btn:hover::before { opacity: 1; }
    .section-btn:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    /* corner brackets on each card */
    .section-btn::after {
      content: ''; position: absolute;
      bottom: 6px; right: 6px;
      width: 10px; height: 10px;
      border-width: 0 1.5px 1.5px 0;
      border-style: solid; border-color: transparent;
      transition: border-color 0.2s;
    }
    .section-btn:hover::after { border-color: currentColor; opacity: 0.4; }

    .sec-peliculas::before   { background: radial-gradient(circle at 50% 100%, rgba(0,229,204,0.10), transparent 70%); }
    .sec-series::before      { background: radial-gradient(circle at 50% 100%, rgba(26,143,255,0.10), transparent 70%); }
    .sec-animes::before      { background: radial-gradient(circle at 50% 100%, rgba(168,85,247,0.10), transparent 70%); }
    .sec-videojuegos::before { background: radial-gradient(circle at 50% 100%, rgba(57,255,20,0.08),  transparent 70%); }
    .sec-libros::before      { background: radial-gradient(circle at 50% 100%, rgba(255,140,0,0.09),  transparent 70%); }
    .sec-tareas::before      { background: radial-gradient(circle at 50% 100%, rgba(255,45,120,0.08), transparent 70%); }

    .sec-peliculas:hover   { border-color: rgba(0,229,204,0.35);  color: var(--cyan);       box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(0,229,204,0.08); }
    .sec-series:hover      { border-color: rgba(26,143,255,0.35); color: var(--blue);       box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(26,143,255,0.08); }
    .sec-animes:hover      { border-color: rgba(168,85,247,0.35); color: var(--purple);     box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(168,85,247,0.08); }
    .sec-videojuegos:hover { border-color: rgba(57,255,20,0.35);  color: var(--green-neon); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(57,255,20,0.06); }
    .sec-libros:hover      { border-color: rgba(255,140,0,0.35);  color: var(--orange);     box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255,140,0,0.06); }
    .sec-tareas:hover      { border-color: rgba(255,45,120,0.35); color: var(--magenta);    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255,45,120,0.06); }

    .section-emoji {
      font-size: 2rem; line-height: 1;
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    .section-btn:hover .section-emoji { transform: scale(1.18) translateY(-3px); }

    .section-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: color 0.2s;
    }

    .section-count {
      position: absolute; top: 10px; right: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      background: var(--bg4); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px;
      color: var(--text3); transition: all 0.2s;
    }
    .section-btn:hover .section-count { background: rgba(255,255,255,0.08); color: var(--text2); }

    /* ── FOOTER ACTIONS ── */
    .footer-actions { margin-top: 3rem; display: flex; gap: 10px; align-items: center; }
    .foot-btn {
      padding: 0.5rem 1.3rem; border-radius: 4px;
      border: 1px solid var(--border2); background: var(--bg2);
      color: var(--text3);
      font-family: 'Orbitron', sans-serif; font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.18s;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .foot-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,204,0.05); box-shadow: var(--glow-cyan); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; padding: 0.6rem 1.4rem;
      font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
      color: var(--text); opacity: 0; pointer-events: none;
      transition: all 0.25s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(57,255,20,0.4); color: var(--green-neon); }
    .toast.error   { border-color: rgba(255,68,102,0.4); color: var(--red); }

    /* ── ENTRY ANIMATIONS ── */
    .header        { animation: fadeUp 0.5s ease both; }
    .year-section  { animation: fadeUp 0.5s ease both 0.10s; }
    .sections-grid { animation: fadeUp 0.5s ease both 0.18s; }
    .footer-actions { animation: fadeUp 0.5s ease both 0.26s; }
    .section-btn:nth-child(1) { animation: fadeUp 0.4s ease both 0.20s; }
    .section-btn:nth-child(2) { animation: fadeUp 0.4s ease both 0.25s; }
    .section-btn:nth-child(3) { animation: fadeUp 0.4s ease both 0.30s; }
    .section-btn:nth-child(4) { animation: fadeUp 0.4s ease both 0.35s; }
    .section-btn:nth-child(5) { animation: fadeUp 0.4s ease both 0.40s; }
    .section-btn:nth-child(6) { animation: fadeUp 0.4s ease both 0.45s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="ambient-blob"></div>
    <div class="ambient-blob"></div>
    <div class="ambient-blob"></div>
  </div>

  <div class="wrapper">

    <header class="header">
      <div class="title-frame">
        <div class="title-inner">El<span>.</span>Trackerino</div>
      </div>
      <p class="title-sub">Tu colección personal · año a año</p>
    </header>

    <div class="year-section">
      <div class="year-tabs-label">Selecciona un año</div>
      <div class="year-tabs-row" id="year-tabs-row"></div>
    </div>

    <div class="sections-grid" id="sections-grid">
      <a class="section-btn sec-peliculas" id="btn-peliculas">
        <span class="section-emoji">🎬</span>
        <span class="section-label">Películas</span>
        <span class="section-count" id="count-pelicula">0</span>
      </a>
      <a class="section-btn sec-series" id="btn-series">
        <span class="section-emoji">📺</span>
        <span class="section-label">Series</span>
        <span class="section-count" id="count-serie">0</span>
      </a>
      <a class="section-btn sec-animes" id="btn-animes">
        <span class="section-emoji">🎌</span>
        <span class="section-label">Animes</span>
        <span class="section-count" id="count-anime">0</span>
      </a>
      <a class="section-btn sec-videojuegos" id="btn-videojuegos">
        <span class="section-emoji">🎮</span>
        <span class="section-label">Videojuegos</span>
        <span class="section-count" id="count-videojuego">0</span>
      </a>
      <a class="section-btn sec-libros" id="btn-libros">
        <span class="section-emoji">📚</span>
        <span class="section-label">Libros</span>
        <span class="section-count" id="count-libro">0</span>
      </a>
      <a class="section-btn sec-tareas" id="btn-tareas">
        <span class="section-emoji">✅</span>
        <span class="section-label">Tareas</span>
        <span class="section-count" style="display:none"></span>
      </a>
    </div>

    <div class="footer-actions">
      <button class="foot-btn" onclick="exportData()">⬇ Exportar backup</button>
      <button class="foot-btn" onclick="importData()">⬆ Importar backup</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── YEAR STORAGE ──────────────────────────────────────────────────────────
    const YEARS_KEY      = 'trackerino_years_v1';
    const ACTIVE_YEAR_KEY = 'trackerino_active_year';

    function loadYears() {
      try { return JSON.parse(localStorage.getItem(YEARS_KEY)) || [new Date().getFullYear()]; }
      catch { return [new Date().getFullYear()]; }
    }
    function saveYears(years) { localStorage.setItem(YEARS_KEY, JSON.stringify(years)); }
    function getActiveYear() {
      const stored = localStorage.getItem(ACTIVE_YEAR_KEY);
      if (stored) return parseInt(stored);
      const years = loadYears();
      return years[years.length - 1];
    }
    function setActiveYear(year) { localStorage.setItem(ACTIVE_YEAR_KEY, year.toString()); }

    function storageKey(year)      { return `mediatracker_${year}_v1`; }
    function loadDataForYear(year) {
      try { return JSON.parse(localStorage.getItem(storageKey(year))) || { items: [] }; }
      catch { return { items: [] }; }
    }

    function updateCounts(year) {
      const data   = loadDataForYear(year);
      const counts = { pelicula: 0, serie: 0, anime: 0, videojuego: 0, libro: 0 };
      data.items.forEach(i => { if (counts[i.type] !== undefined) counts[i.type]++; });
      Object.entries(counts).forEach(([type, count]) => {
        const el = document.getElementById(`count-${type}`);
        if (el) el.textContent = count;
      });
    }

    function updateNavLinks(year) {
      const pages = { peliculas:'peliculas', series:'series', animes:'animes', videojuegos:'videojuegos', libros:'libros', tareas:'tareas' };
      Object.entries(pages).forEach(([id, file]) => {
        const el = document.getElementById(`btn-${id}`);
        if (el) el.href = `${file}.html?year=${year}`;
      });
    }

    function renderTabs() {
      const years      = loadYears();
      const activeYear = getActiveYear();
      const row        = document.getElementById('year-tabs-row');
      row.innerHTML    = '';

      years.forEach(year => {
        const tab = document.createElement('button');
        tab.className = 'year-tab' + (year === activeYear ? ' active' : '');
        tab.innerHTML = `
          <span>${year}</span>
          ${years.length > 1
            ? `<span class="year-tab-delete" onclick="deleteYear(event,${year})" title="Eliminar año ${year}">✕</span>`
            : ''}
        `;
        tab.addEventListener('click', e => {
          if (e.target.classList.contains('year-tab-delete')) return;
          switchYear(year);
        });
        row.appendChild(tab);
      });

      // + button with year picker dropdown
      const wrap = document.createElement('div');
      wrap.className = 'year-add-wrap';

      const addBtn = document.createElement('button');
      addBtn.className   = 'year-add-btn';
      addBtn.title       = 'Añadir año';
      addBtn.textContent = '＋';
      addBtn.addEventListener('click', e => { e.stopPropagation(); toggleYearPicker(wrap); });

      const dropdown = document.createElement('div');
      dropdown.className = 'year-picker-dropdown';
      dropdown.id        = 'year-picker-dropdown';

      const header = document.createElement('div');
      header.className   = 'year-picker-header';
      header.textContent = 'Seleccionar año';
      dropdown.appendChild(header);

      const list = document.createElement('div');
      list.className = 'year-picker-list';

      const currentYears = loadYears();
      for (let y = 2025; y <= 2100; y++) {
        const btn = document.createElement('button');
        btn.className   = 'year-picker-option' + (currentYears.includes(y) ? ' already-added' : '');
        btn.textContent = y;
        if (!currentYears.includes(y)) {
          btn.addEventListener('click', e => { e.stopPropagation(); addYear(y); });
        }
        list.appendChild(btn);
      }
      dropdown.appendChild(list);

      // Scroll list to current year area on open
      wrap.appendChild(addBtn);
      // Append dropdown to body so it escapes all overflow/clip-path contexts
      dropdown.dataset.wrapId = 'year-add-wrap';
      document.body.appendChild(dropdown);
      // Store reference on wrap for toggleYearPicker
      wrap._dropdown = dropdown;
      row.appendChild(wrap);
    }

    function toggleYearPicker(wrap) {
      const dropdown = wrap._dropdown || wrap.querySelector('.year-picker-dropdown');
      const isOpen   = dropdown.classList.contains('open');
      document.querySelectorAll('.year-picker-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) {
        dropdown.classList.add('open');
        const btn  = wrap.querySelector('.year-add-btn');
        const rect = btn.getBoundingClientRect();
        dropdown.style.top  = (rect.bottom + 8) + 'px';
        let left = rect.left + rect.width / 2 - 70;
        left = Math.max(8, Math.min(left, window.innerWidth - 156));
        dropdown.style.left = left + 'px';
        const list        = dropdown.querySelector('.year-picker-list');
        const currentYear = new Date().getFullYear();
        const targetIdx   = currentYear - 2025;
        list.scrollTop    = Math.max(0, targetIdx * 34 - 60);
      }
    }

    // Close picker when clicking outside
    document.addEventListener('click', () => {
      document.querySelectorAll('.year-picker-dropdown.open').forEach(d => d.classList.remove('open'));
    });

    function switchYear(year) {
      setActiveYear(year);
      renderTabs();
      updateNavLinks(year);
      updateCounts(year);
    }

    function addYear(year) {
      const years = loadYears();
      if (years.includes(year)) { toast(`El año ${year} ya existe`, 'error'); return; }
      years.push(year);
      years.sort((a, b) => a - b);
      saveYears(years);
      // Close picker before re-render
      document.querySelectorAll('.year-picker-dropdown.open').forEach(d => d.classList.remove('open'));
      switchYear(year);
      toast(`Año ${year} añadido`, 'success');
    }

    function deleteYear(e, year) {
      e.stopPropagation();
      const years = loadYears();
      if (years.length <= 1) { toast('Debes tener al menos un año', 'error'); return; }
      if (!confirm(`¿Eliminar el año ${year} y todos sus datos?\n\nEsta acción no se puede deshacer.`)) return;
      localStorage.removeItem(storageKey(year));
      localStorage.removeItem(`trackerino_tareas_${year}_v1`);
      const newYears = years.filter(y => y !== year);
      saveYears(newYears);
      const activeYear = getActiveYear();
      if (activeYear === year) switchYear(newYears[newYears.length - 1]);
      else renderTabs();
      toast(`Año ${year} eliminado`, '');
    }

    // ── EXPORT / IMPORT ───────────────────────────────────────────────────────
    function exportData() {
      const years  = loadYears();
      const backup = { version: 2, exportedAt: new Date().toISOString(), years, data: {} };
      years.forEach(year => {
        backup.data[year] = {
          media: loadDataForYear(year),
          tareas: (() => {
            try { return JSON.parse(localStorage.getItem(`trackerino_tareas_${year}_v1`)) || { lists: [] }; }
            catch { return { lists: [] }; }
          })(),
        };
      });
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `eltrackerino-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Backup exportado ✓', 'success');
    }

    function importData() {
      const input  = document.createElement('input');
      input.type   = 'file';
      input.accept = '.json,application/json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (parsed.version === 2 && parsed.data) {
              const total = Object.values(parsed.data).reduce((acc,d) => acc + (d.media?.items?.length || 0), 0);
              if (!confirm(`¿Importar backup de ${parsed.years?.length || 0} años con ${total} entradas? Se reemplazarán todos los datos actuales.`)) return;
              saveYears(parsed.years || [new Date().getFullYear()]);
              Object.entries(parsed.data).forEach(([year, d]) => {
                if (d.media)  localStorage.setItem(storageKey(parseInt(year)), JSON.stringify(d.media));
                if (d.tareas) localStorage.setItem(`trackerino_tareas_${year}_v1`, JSON.stringify(d.tareas));
              });
              const lastYear = parsed.years?.[parsed.years.length - 1] || new Date().getFullYear();
              switchYear(lastYear);
              toast('Backup importado correctamente ✓', 'success');
              return;
            }
            const mediaData = parsed.mediatracker || parsed;
            if (!Array.isArray(mediaData.items)) throw new Error('Formato inválido');
            const year = getActiveYear();
            if (!confirm(`¿Importar backup antiguo en el año ${year}?`)) return;
            localStorage.setItem(storageKey(year), JSON.stringify(mediaData));
            if (parsed.tareas) localStorage.setItem(`trackerino_tareas_${year}_v1`, JSON.stringify(parsed.tareas));
            updateCounts(year);
            toast('Backup importado correctamente ✓', 'success');
          } catch (err) {
            toast('Error al leer el archivo: ' + err.message, 'error');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className   = `toast ${type} show`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const activeYear = getActiveYear();
      renderTabs();
      updateNavLinks(activeYear);
      updateCounts(activeYear);
    });
  </script>
</body>
</html>
